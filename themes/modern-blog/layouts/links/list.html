{{ define "main" }}
<div class="links">
    <h1 class="page-title">友情链接</h1>
    
    {{ $links := .Site.Data.links }}
    
    {{ if $links }}
    <div class="card-grid">
        {{ range $links }}
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="card link-card">
            <h3 class="link-name">{{ .name }}</h3>
            <div class="link-url">{{ .url }}</div>
        </a>
        {{ end }}
    </div>
    {{ else }}
    <div class="empty-state">
        <div class="empty-state-icon">🔗</div>
        <p>暂无链接</p>
    </div>
    {{ end }}
</div>
{{ end }}
