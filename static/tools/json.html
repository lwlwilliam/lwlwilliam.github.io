<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* 导航栏 */
        nav { border-bottom: 1px solid #f0f0f0; padding: 1rem 2rem; display: flex; justify-content: center; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.25rem; }
        .logo-icon { width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; font-family: monospace; }

        /* 主体布局 */
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .container { width: 100%; max-width: 1200px; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 2rem; background: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        /* 区域头部 */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 0.5rem; }
        .label { font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        .count { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }

        /* 文本输入框 */
        textarea {
            width: 100%; height: 400px; padding: 1rem; border-radius: 0.75rem;
            border: 1px solid #e2e8f0; background-color: #ffffff;
            font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
            font-size: 0.875rem; resize: vertical; transition: all 0.2s; outline: none; color: #1e293b;
            line-height: 1.6; tab-size: 2;
        }
        textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* 输出区域 */
        .output-wrap {
            height: 400px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 0.75rem;
            background: #fafafa; transition: all 0.2s;
        }
        .output-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
        .output-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .output-wrap::-webkit-scrollbar-track { background: transparent; }
        .json-highlight {
            padding: 1rem; font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
            font-size: 0.875rem; line-height: 1.6; white-space: pre; tab-size: 4; color: #1e293b;
            margin: 0;
        }
        .placeholder { padding: 2rem; text-align: center; color: #9ca3af; font-size: 0.875rem; }

        /* JSON 语法高亮配色 */
        :root {
            --c-key: #2563eb;
            --c-str: #16a34a;
            --c-num: #ea580c;
            --c-bool: #9333ea;
            --c-null: #6b7280;
            --c-punct: #94a3b8;
        }
        .tk-key { color: var(--c-key); }
        .tk-str { color: var(--c-str); }
        .tk-num { color: var(--c-num); }
        .tk-bool { color: var(--c-bool); }
        .tk-null { color: var(--c-null); font-style: italic; }
        .tk-punct { color: var(--c-punct); }

        /* 折叠展开 */
        .foldable { display: inline; }
        .fold-toggle {
            display: inline-block; width: 1em; cursor: pointer; user-select: none;
            color: #94a3b8; text-align: center; font-size: 0.7em; transition: color 0.15s;
        }
        .fold-toggle:hover { color: #2563eb; }
        .fold-ellipsis { color: #94a3b8; cursor: pointer; user-select: none; }
        .fold-ellipsis:hover { color: #2563eb; }

        /* 状态标签 */
        .status-badge {
            font-size: 0.7rem; font-weight: 600; padding: 2px 10px; border-radius: 1rem; white-space: nowrap;
        }
        .status-valid { background: #dcfce7; color: #16a34a; }
        .status-error { background: #fee2e2; color: #dc2626; }
        .status-warn { background: #fef3c7; color: #d97706; }

        /* 错误展示 */
        .error-banner {
            padding: 0.75rem 1rem; background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 0.5rem 0.5rem 0 0; color: #dc2626; font-size: 0.8rem;
            font-family: inherit; line-height: 1.6; border-bottom: none;
        }
        .error-pos { font-size: 0.7rem; color: #991b1b; margin-left: 0.5rem; opacity: 0.8; }
        .error-context {
            padding: 1rem; font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 0.875rem;
            line-height: 1.8; white-space: pre-wrap; word-break: break-all; color: #1e293b; margin: 0;
            border: 1px solid #fecaca; border-radius: 0 0 0.5rem 0.5rem; background: #fff;
        }
        .error-marker {
            background: #dc2626; color: #fff; border-radius: 3px; padding: 1px 3px;
            font-weight: 700; text-decoration: underline wavy #fff; text-underline-offset: 3px;
            cursor: help; box-shadow: 0 0 0 2px rgba(220,38,38,0.3);
        }
        .error-truncate { color: #9ca3af; }

        /* 内容过长提示 */
        .too-long {
            padding: 2rem 1.5rem; text-align: center; color: #d97706; font-size: 0.875rem; line-height: 1.8;
        }
        .too-long strong { font-size: 1rem; display: block; margin-bottom: 0.5rem; }

        /* 按钮样式 */
        button { cursor: pointer; border: none; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { flex: 1; padding: 0.6rem; background: #2563eb; color: white; border-radius: 0.5rem; font-size: 0.875rem; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { flex: 1; padding: 0.6rem; background: #f1f5f9; color: #475569; border-radius: 0.5rem; font-size: 0.875rem; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-secondary:active { transform: scale(0.98); }
        .btn-text { background: none; color: #2563eb; font-size: 0.75rem; font-weight: 700; }
        .btn-text:hover { color: #1d4ed8; text-decoration: underline; }
        .btn-clear { color: #ef4444; font-size: 0.875rem; background: none; }
        .btn-clear:hover { color: #dc2626; }
        .btn-row { display: flex; gap: 0.75rem; margin-top: 0.75rem; }

        /* 下拉选择 */
        select {
            padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.375rem;
            font-size: 0.75rem; background: #ffffff; color: #475569; cursor: pointer; outline: none;
        }
        select:focus { border-color: #2563eb; }

        /* Toast 提示 */
        #toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(1rem);
            background: #111827; color: white; padding: 0.75rem 1.5rem;
            border-radius: 2rem; font-size: 0.875rem; opacity: 0;
            transition: all 0.3s; pointer-events: none; z-index: 100;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 暗色主题 */
        body.dark { background-color: #111827; color: #e2e8f0; }
        body.dark nav { border-color: #2d3a4f; }
        body.dark .logo { color: #e2e8f0; }
        body.dark .logo-icon { background: #3b82f6; }
        body.dark .container { background: #1e293b; border-color: #374151; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        body.dark textarea { background: #1a2332; border-color: #374151; color: #e2e8f0; }
        body.dark textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.2); }
        body.dark .output-wrap { background: #1a2332; border-color: #374151; }
        body.dark .output-wrap::-webkit-scrollbar-thumb { background: #475569; }
        body.dark .json-highlight { color: #e2e8f0; }
        body.dark .placeholder { color: #64748b; }
        body.dark .label { color: #94a3b8; }
        body.dark .count { color: #64748b; }
        body.dark .btn-primary { background: #3b82f6; }
        body.dark .btn-primary:hover { background: #2563eb; }
        body.dark .btn-secondary { background: #374151; color: #cbd5e1; }
        body.dark .btn-secondary:hover { background: #4b5563; }
        body.dark .btn-text { color: #60a5fa; }
        body.dark .btn-clear { color: #f87171; }
        body.dark .btn-clear:hover { color: #fca5a5; }
        body.dark select { background: #374151; border-color: #4b5563; color: #cbd5e1; }
        body.dark .fold-toggle { color: #64748b; }
        body.dark .fold-toggle:hover { color: #60a5fa; }
        body.dark .fold-ellipsis { color: #64748b; }
        body.dark .fold-ellipsis:hover { color: #60a5fa; }
        body.dark .error-banner { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }
        body.dark .error-context { color: #e2e8f0; border-color: #7f1d1d; background: #1a2332; }
        body.dark .error-marker { background: #dc2626; color: #fff; box-shadow: 0 0 0 2px rgba(220,38,38,0.4); }
        body.dark .error-truncate { color: #64748b; }
        body.dark .too-long { color: #fbbf24; }
        body.dark .status-valid { background: #052e16; color: #4ade80; }
        body.dark .status-error { background: #450a0a; color: #fca5a5; }
        body.dark .status-warn { background: #451a03; color: #fbbf24; }
        body.dark { --c-key: #60a5fa; --c-str: #4ade80; --c-num: #fb923c; --c-bool: #c084fc; --c-null: #94a3b8; --c-punct: #64748b; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            main { padding: 1rem; }
            textarea { height: 250px; }
            .output-wrap { height: 250px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-content">
        <div class="logo">
            <div class="logo-icon">{ }</div>
            JSON Tool
        </div>
        <button onclick="clearAll()" class="btn-clear">清空全部</button>
    </div>
</nav>

<main>
    <div class="container">
        <div class="grid">
            <div>
                <div class="section-header">
                    <span class="label">原始 JSON</span>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <select id="indentSelect" onchange="updateIndent()">
                            <option value="2">2 空格缩进</option>
                            <option value="4">4 空格缩进</option>
                            <option value="tab">Tab 缩进</option>
                        </select>
                        <span class="count" id="inputCount">0 字符</span>
                    </div>
                </div>
                <textarea id="inputText" placeholder='粘贴或输入 JSON...&#10;{"name": "json", "valid": true, "items": [1, 2, 3]}'></textarea>
                <div class="btn-row">
                    <button onclick="formatJson()" class="btn-primary">格式化</button>
                    <button onclick="minifyJson()" class="btn-secondary">压缩</button>
                </div>
            </div>

            <div>
                <div class="section-header">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span class="label">高亮结果</span>
                        <span class="status-badge" id="statusBadge" style="display:none"></span>
                    </div>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <button onclick="copyResult()" class="btn-text" id="copyBtn">📋 复制结果</button>
                    </div>
                </div>
                <div class="output-wrap" id="outputWrap">
                    <div class="placeholder">输入 JSON 后在此显示高亮结果...</div>
                </div>
                <div class="btn-row">
                    <button onclick="expandAll()" class="btn-secondary">全部展开</button>
                    <button onclick="collapseAll()" class="btn-secondary">全部折叠</button>
                </div>
            </div>
        </div>
        <p style="text-align: center; margin-top: 2rem; color: #9ca3af; font-size: 0.7rem;">
            本地原生处理 · 隐私安全 · 无第三方追踪 · 最大支持 500K 字符
        </p>
    </div>
</main>

<div id="toast">提示信息</div>

<script>
    const MAX_LENGTH = 500000;
    const inputEl = document.getElementById('inputText');
    const outputWrap = document.getElementById('outputWrap');
    const statusBadge = document.getElementById('statusBadge');
    const toastEl = document.getElementById('toast');
    const indentSelect = document.getElementById('indentSelect');
    let indentStr = '  ';
    let debounceTimer = null;

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function updateIndent() {
        const val = indentSelect.value;
        indentStr = val === 'tab' ? '\t' : ' '.repeat(parseInt(val));
        if (inputEl.value.trim()) processInput();
    }

    function updateCount() {
        document.getElementById('inputCount').innerText = `${inputEl.value.length.toLocaleString()} 字符`;
    }

    inputEl.addEventListener('input', () => {
        updateCount();
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(processInput, 300);
    });

    function processInput() {
        const text = inputEl.value.trim();
        if (!text) {
            outputWrap.innerHTML = '<div class="placeholder">输入 JSON 后在此显示高亮结果...</div>';
            statusBadge.style.display = 'none';
            return;
        }

        if (text.length > MAX_LENGTH) {
            outputWrap.innerHTML =
                '<div class="too-long"><strong>⚠ 内容过长</strong>' +
                `当前 ${text.length.toLocaleString()} 字符，超过最大限制 ${MAX_LENGTH.toLocaleString()} 字符。<br>` +
                '请使用较小的 JSON 数据。</div>';
            statusBadge.style.display = '';
            statusBadge.className = 'status-badge status-warn';
            statusBadge.textContent = '过长';
            return;
        }

        try {
            const parsed = JSON.parse(text);
            const html = renderJson(parsed, null, 0);
            outputWrap.innerHTML = `<pre class="json-highlight">${html}</pre>`;
            statusBadge.style.display = '';
            statusBadge.className = 'status-badge status-valid';
            statusBadge.textContent = '✓ 有效';
        } catch (e) {
            const pos = getErrorPosition(e.message, inputEl.value);
            outputWrap.innerHTML = renderError(inputEl.value, e, pos);
            statusBadge.style.display = '';
            statusBadge.className = 'status-badge status-error';
            statusBadge.textContent = '✗ 错误';
        }
    }

    function getErrorPosition(msg, text) {
        let m = msg.match(/position (\d+)/);
        if (m) return parseInt(m[1]);
        m = msg.match(/line (\d+) column (\d+)/);
        if (m) {
            const line = parseInt(m[1]);
            const col = parseInt(m[2]);
            const lines = text.split('\n');
            let pos = 0;
            for (let i = 0; i < line - 1 && i < lines.length; i++) {
                pos += lines[i].length + 1;
            }
            return pos + col - 1;
        }
        return -1;
    }

    function getLineCol(text, pos) {
        const before = text.substring(0, pos);
        const lines = before.split('\n');
        return { line: lines.length, col: lines[lines.length - 1].length + 1 };
    }

    function renderError(text, error, pos) {
        let html = `<div class="error-banner">✗ ${escapeHtml(error.message)}`;
        if (pos >= 0) {
            const { line, col } = getLineCol(text, pos);
            html += ` <span class="error-pos">第 ${line} 行，第 ${col} 列（位置 ${pos}）</span>`;
        }
        html += '</div>';

        if (pos >= 0 && pos <= text.length) {
            const ctxStart = Math.max(0, pos - 80);
            const ctxEnd = Math.min(text.length, pos + 80);
            const before = text.substring(ctxStart, pos);
            const char = text[pos] || ' ';
            const after = text.substring(pos + 1, ctxEnd);

            html += '<pre class="error-context">';
            if (ctxStart > 0) html += '<span class="error-truncate">…</span>';
            html += escapeHtml(before);
            html += `<span class="error-marker" title="${escapeHtml(error.message)}">${escapeHtml(char)}</span>`;
            html += escapeHtml(after);
            if (ctxEnd < text.length) html += '<span class="error-truncate">…</span>';
            html += '</pre>';
        }
        return html;
    }

    function renderJson(value, key, level) {
        let html = '';

        if (key !== null) {
            html += `<span class="tk-key">${escapeHtml(JSON.stringify(key))}</span><span class="tk-punct">: </span>`;
        }

        if (value === null) {
            html += '<span class="tk-null">null</span>';
        } else if (typeof value === 'boolean') {
            html += `<span class="tk-bool">${value}</span>`;
        } else if (typeof value === 'number') {
            html += `<span class="tk-num">${value}</span>`;
        } else if (typeof value === 'string') {
            html += `<span class="tk-str">${escapeHtml(JSON.stringify(value))}</span>`;
        } else if (Array.isArray(value) || typeof value === 'object') {
            const isArr = Array.isArray(value);
            const open = isArr ? '[' : '{';
            const close = isArr ? ']' : '}';
            const entries = isArr
                ? value.map(v => [null, v])
                : Object.entries(value).map(([k, v]) => [k, v]);

            if (entries.length === 0) {
                html += `<span class="tk-punct">${open}${close}</span>`;
            } else {
                html += '<span class="foldable">';
                html += '<span class="fold-toggle">▼</span>';
                html += `<span class="tk-punct">${open}</span>`;
                html += '<span class="fold-ellipsis" style="display:none"> … </span>';
                html += '<span class="fold-content">';

                entries.forEach(([k, v], i) => {
                    html += '\n' + indentStr.repeat(level + 1);
                    html += renderJson(v, k, level + 1);
                    if (i < entries.length - 1) html += '<span class="tk-punct">,</span>';
                });

                html += '\n' + indentStr.repeat(level);
                html += '</span>';
                html += `<span class="tk-punct">${close}</span>`;
                html += '</span>';
            }
        }

        return html;
    }

    outputWrap.addEventListener('click', function(e) {
        if (e.target.classList.contains('fold-toggle') || e.target.classList.contains('fold-ellipsis')) {
            toggleFold(e.target);
        }
    });

    function toggleFold(el) {
        const foldable = el.closest('.foldable');
        if (!foldable) return;
        const content = foldable.querySelector(':scope > .fold-content');
        const ellipsis = foldable.querySelector(':scope > .fold-ellipsis');
        const toggle = foldable.querySelector(':scope > .fold-toggle');
        const collapsed = content.style.display === 'none';
        if (collapsed) {
            content.style.display = '';
            ellipsis.style.display = 'none';
            toggle.textContent = '▼';
        } else {
            content.style.display = 'none';
            ellipsis.style.display = '';
            toggle.textContent = '▶';
        }
    }

    function expandAll() {
        outputWrap.querySelectorAll('.fold-content').forEach(el => el.style.display = '');
        outputWrap.querySelectorAll('.fold-ellipsis').forEach(el => el.style.display = 'none');
        outputWrap.querySelectorAll('.fold-toggle').forEach(el => el.textContent = '▼');
    }

    function collapseAll() {
        outputWrap.querySelectorAll('.fold-content').forEach(el => el.style.display = 'none');
        outputWrap.querySelectorAll('.fold-ellipsis').forEach(el => el.style.display = '');
        outputWrap.querySelectorAll('.fold-toggle').forEach(el => el.textContent = '▶');
    }

    function formatJson() {
        const text = inputEl.value.trim();
        if (!text) { showToast('请输入 JSON', true); return; }
        if (text.length > MAX_LENGTH) { showToast('内容过长，无法格式化', true); return; }
        try {
            const parsed = JSON.parse(text);
            inputEl.value = JSON.stringify(parsed, null, indentStr);
            updateCount();
            processInput();
            showToast('格式化成功');
        } catch (e) {
            showToast('JSON 格式错误：' + e.message, true);
        }
    }

    function minifyJson() {
        const text = inputEl.value.trim();
        if (!text) { showToast('请输入 JSON', true); return; }
        if (text.length > MAX_LENGTH) { showToast('内容过长，无法压缩', true); return; }
        try {
            const parsed = JSON.parse(text);
            inputEl.value = JSON.stringify(parsed);
            updateCount();
            processInput();
            showToast('压缩成功');
        } catch (e) {
            showToast('JSON 格式错误：' + e.message, true);
        }
    }

    function copyResult() {
        const text = inputEl.value;
        if (!text) { showToast('没有可复制的内容', true); return; }
        const handleSuccess = () => {
            const btn = document.getElementById('copyBtn');
            const old = btn.innerText;
            btn.innerText = '✅ 已复制';
            showToast('已成功复制');
            setTimeout(() => { btn.innerText = old; }, 2000);
        };
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(handleSuccess).catch(() => fallbackCopy(text, handleSuccess));
        } else {
            fallbackCopy(text, handleSuccess);
        }
    }

    function fallbackCopy(text, cb) {
        inputEl.select();
        try { if (document.execCommand('copy')) cb(); } catch (e) { showToast('复制失败', true); }
    }

    function clearAll() {
        inputEl.value = '';
        updateCount();
        outputWrap.innerHTML = '<div class="placeholder">输入 JSON 后在此显示高亮结果...</div>';
        statusBadge.style.display = 'none';
        showToast('已清空内容');
    }

    function showToast(msg, isError = false) {
        toastEl.innerText = msg;
        toastEl.style.backgroundColor = isError ? '#ef4444' : '#111827';
        toastEl.classList.add('show');
        setTimeout(() => { toastEl.classList.remove('show'); }, 2000);
    }

    updateCount();
</script>
<script>
(function(){
    window.addEventListener('message', function(e){
        if (e.data && e.data.type === 'theme') {
            document.body.classList.toggle('dark', e.data.theme === 'dark');
        }
    });
})();
</script>
</body>
</html>
