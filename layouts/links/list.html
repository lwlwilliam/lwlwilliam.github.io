{{ define "main" }}
<div class="links-page">
  <div class="link-grid">
    {{ range $index, $link := site.Data.links }}
    <a href="{{ $link.url }}" target="_blank" class="link-card" rel="noopener noreferrer">
      <span class="link-card-icon">{{ add $index 1 }}</span>
      <div class="link-card-body">
        <h3 class="link-card-name">{{ $link.name }}</h3>
        <span class="link-card-arrow">→</span>
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
