{{ define "main" }}
<div class="tools-page">
  <div class="tool-grid">
    {{ range site.Data.tools }}
    <a href="/tools/{{ .file_name }}.html" target="_blank" class="tool-card" rel="noopener noreferrer">
      <span class="tool-card-name">{{ .name }}</span>
      {{ with .desc }}
      <span class="tool-card-desc">{{ . }}</span>
      {{ end }}
      <span class="tool-card-action">Open →</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
