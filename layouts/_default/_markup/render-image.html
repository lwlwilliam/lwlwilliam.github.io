{{- $url := .Destination -}}
{{- $url = replaceRE `(\.\./)+static/` "/" $url -}}
{{- if not (strings.HasPrefix $url "/") -}}
{{- $url = print "/" $url -}}
{{- end -}}
<figure class="img-figure">
  <img src="{{ $url }}" alt="{{ .Text }}" loading="lazy" decoding="async" class="img-lazy" onload="this.classList.add('loaded')" onerror="this.style.opacity='0'"{{ with .Title }} title="{{ . }}"{{ end }}>
  <div class="img-shimmer" aria-hidden="true">
    <div class="img-shimmer-track"></div>
    <svg class="img-shimmer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>
</figure>
